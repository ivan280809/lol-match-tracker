name: Publish GHCR Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/lol-match-tracker
  PACKAGE_NAME: lol-match-tracker

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B clean test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Make GHCR package public
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          endpoints=(
            "https://api.github.com/user/packages/container/${PACKAGE_NAME}/visibility"
            "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE_NAME}/visibility"
          )

          for endpoint in "${endpoints[@]}"; do
            response_file="$(mktemp)"
            status_code="$(
              curl -sS \
                -o "${response_file}" \
                -w "%{http_code}" \
                -X PATCH \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${endpoint}" \
                -d '{"visibility":"public"}'
            )"

            if [[ "${status_code}" =~ ^20[0-9]$ ]]; then
              echo "Package visibility updated with ${endpoint}"
              cat "${response_file}"
              exit 0
            fi

            echo "Visibility update failed with status ${status_code} for ${endpoint}"
            cat "${response_file}"
          done

          echo "Unable to make the GHCR package public"
          exit 1
