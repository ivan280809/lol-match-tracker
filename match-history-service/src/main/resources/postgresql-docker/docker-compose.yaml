version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-micro
    restart: always
    environment:
      POSTGRES_DB: micros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
