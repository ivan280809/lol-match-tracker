spring.application.name=lol-match-tracker
server.port=${SERVER_PORT:8080}

riot.api.key=${RIOT_API_KEY:}
riot.api.base-url=${RIOT_API_BASE_URL:https://europe.api.riotgames.com/}
match.service.base-url=${MATCH_PLAYER_SERVICE_URL:http://localhost:${SERVER_PORT:8080}}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:micros}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:${SERVER_PORT:8080}/notification}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}

management.endpoints.web.exposure.include=*
spring.codec.max-in-memory-size=10MB
